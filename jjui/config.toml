[[actions]]
name = "open_file"
lua = '''
local file = context.file()
if not file then
    flash("No file selected")
    return
end

exec_shell("$EDITOR $(realpath " .. file .. ")")
'''

[[actions]]
name = "quick_revset"
lua = '''
local selected = choose({
    options = {
        "mine()",
        "all()",
        "trunk()..@",
        revset.default()
    },
    title = "Quick Revset"
})

if selected then
    revset.set(selected)
    flash("Revset: " .. selected)
end
'''

[[bindings]]
action = "quick_revset"
key = "ctrl+r"
scope = "revisions"

[[bindings]]
action = "open_file"
key = "e"
scope = "revisions.details"
